<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Date?</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow:hidden;
}

.container{
margin-top:120px;
}

h1{
font-size:38px;
color:#333;
}

button{
font-size:20px;
padding:15px 30px;
margin:15px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:#555;
color:white;
position:absolute;
}

iframe{
width:90%;
max-width:500px;
height:280px;
border:none;
margin-top:20px;
}

#videoContainer{
display:none;
}

.confetti{
position:fixed;
top:-20px;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<div class="container">

<h1 id="question">Will you go on a date with me? 💖</h1>

<button id="yes">Yes 😍</button>
<button id="no">No 🙃</button>

<div id="videoContainer">
<iframe width="560" height="315" src="https://www.youtube.com/embed/FxR88PsnfVY?si=haDRusAIf7ZfycfO&amp;controls=0&amp;start=25" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>


</div>

</div>

<script>

const noBtn=document.getElementById("no");
const yesBtn=document.getElementById("yes");
const video=document.getElementById("videoContainer");
const question=document.getElementById("question");

/* NO button moves */

function moveButton(){

const x=Math.random()*(window.innerWidth-100);
const y=Math.random()*(window.innerHeight-50);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseover",moveButton);
noBtn.addEventListener("click",moveButton);


/* YES click */

yesBtn.addEventListener("click",()=>{

video.style.display="block";

startConfetti();

startQuestions();

});


/* Confetti */

function startConfetti(){

for(let i=0;i<80;i++){

const confetti=document.createElement("div");

confetti.className="confetti";
confetti.innerHTML="🎉";

confetti.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(confetti);

setTimeout(()=>confetti.remove(),3000);

}

}


/* Questions */

function startQuestions(){

const lines=[

"Where? 🤔",
"CP??",
"What? 😏",
"🍻",
"Who's paying? 💸",
"🫵"

];

let i=0;

function next(){

if(i<lines.length){

question.innerHTML=lines[i];

i++;

setTimeout(next,2000);

}

}

next();

}

</script>

</body>

</html>
