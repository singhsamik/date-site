<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will You Go Out With Me?</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: #ffe6f0;
    text-align: center;
    padding-top: 120px;
}

h1{
    font-size: 40px;
}

button{
    font-size: 20px;
    padding: 15px 30px;
    margin: 20px;
    cursor: pointer;
    border-radius: 10px;
    border: none;
}

#yes{
    background: #ff4d6d;
    color: white;
}

#no{
    background: #999;
    color: white;
    position: absolute;
}
</style>
</head>

<body>

<h1>Will you go on a date with me? ❤️</h1>

<button id="yes">Yes 😊</button>
<button id="no">No 😢</button>

<script>

const noBtn = document.getElementById("no");
const yesBtn = document.getElementById("yes");

// Move NO button randomly
function moveButton(){
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("click", moveButton);

// YES button → play YouTube video
yesBtn.addEventListener("click", () => {
    window.location.href = "https://youtu.be/FxR88PsnfVY?si=-PbAotrxeYhVxI7g";
});

</script>

</body>
</html>
